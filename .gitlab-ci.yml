variables:
  VERSION: $CI_PIPELINE_ID-$CI_COMMIT_REF_SLUG

image: registry.gitlab.edina.ac.uk:1875/shared/gitlab-ci-tools

stages:
  - build
  - publish

build:
  stage: build
  before_script:
    # important to have so we have a larger rate limit for pulling images
    - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN registry.gitlab.edina.ac.uk
    - docker login -u ${DOCKER_HUB_USERNAME} -p ${DOCKER_HUB_PASSWORD}
  script:
    - docker-compose build
    - docker tag edina/nbexchange:$VERSION $IMAGE_NAME:$VERSION
    - docker push $IMAGE_NAME:$VERSION

publish-python:
  stage: publish
  variables:
    FLIT_INDEX_URL: https://gitlab.edina.ac.uk/api/v4/projects/${CI_PROJECT_ID}/packages/pypi
  script:
    - pip install flit
    - flit build
    - FLIT_PASSWORD=${CI_JOB_TOKEN} FLIT_USERNAME=gitlab-ci-token flit publish
  only:
    - tags

